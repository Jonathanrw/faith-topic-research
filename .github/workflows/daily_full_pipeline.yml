name: Daily Full Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '15 11 * * *'
  workflow_dispatch:

concurrency:
  group: daily-full-pipeline
  cancel-in-progress: false

jobs:
  full_pipeline:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      OPENAI_MODEL: gpt-5
      MAX_TOPICS_PER_DAY: 20
      MIN_TOPIC_SCORE: 50
      MAX_SEARCH_RESULTS_PER_QUERY: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y moviepy || true
          pip install --no-cache-dir -r requirements.txt

      - name: Run daily topic research
        run: python -m src.main

      - name: Generate scripts
        run: python -m src.generate_scripts

      - name: Generate audio
        run: python -m src.generate_audio

      - name: Generate backgrounds
        run: python -m src.background_generator

      - name: Render videos and thumbnails
        run: python -m src.render_videos

      - name: Generate schedule
        run: python -m src.generate_schedule

      - name: Print missing asset report
        run: python -m src.missing_asset_report

      - name: Run publish readiness check
        run: python -m src.check_publish_ready

      - name: Publish scheduled YouTube videos
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -m src.publish_youtube

      - name: Commit pipeline outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json || true
          git add content/scripts/* || true
          git add content/audio/* || true
          git add content/backgrounds/* || true
          git add content/videos/* || true
          git add content/thumbnails/* || true
          git add content/schedules/* || true
          git add content/manifests/* || true
          git diff --cached --quiet || git commit -m "Daily full pipeline run"
          git push
