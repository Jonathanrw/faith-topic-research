name: Daily Full Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:

concurrency:
  group: daily-full-pipeline
  cancel-in-progress: false

jobs:
  full_pipeline:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # Keep publishing OFF until build mode is stable
      PIPELINE_LIVE: false
      LIVE_TEST_OVERRIDE: false

      # Current low-cost settings
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-mini
      MAX_TOPICS_PER_DAY: 2
      MIN_TOPIC_SCORE: 30
      MAX_SEARCH_RESULTS_PER_QUERY: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Create safe runner
        run: |
          cat << 'EOF' > safe_run.sh
          #!/bin/bash
          set -e
          CMD=$1
          echo "Running: $CMD"
          for i in {1..2}
          do
            echo "Attempt $i..."
            if eval $CMD; then
              echo "Success"
              exit 0
            fi
            echo "Retrying in 5 seconds..."
            sleep 5
          done
          echo "Step failed."
          exit 1
          EOF
          chmod +x safe_run.sh

      - name: Topic Research
        run: ./safe_run.sh "python -m src.main"

      - name: Generate Scripts
        run: ./safe_run.sh "python -m src.generate_scripts"

      - name: Generate Audio
        run: ./safe_run.sh "python -m src.generate_audio"

      - name: Generate Backgrounds
        run: ./safe_run.sh "python -m src.background_generator"

      - name: Render Videos
        run: ./safe_run.sh "python -m src.render_videos"

      - name: Generate Schedule
        run: ./safe_run.sh "python -m src.generate_schedule"

      - name: Show generated files
        if: always()
        run: |
          echo "===== content tree ====="
          ls -R content || true
          echo "===== recent videos ====="
          ls -lah content/videos || true
          echo "===== recent audio ====="
          ls -lah content/audio || true
          echo "===== recent backgrounds ====="
          ls -lah content/backgrounds || true
          echo "===== recent schedules ====="
          ls -lah content/schedules || true

      - name: Commit Pipeline Outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/*.json || true
          git add content/scripts/* || true
          git add content/audio/* || true
          git add content/backgrounds/* || true
          git add content/videos/* || true
          git add content/thumbnails/* || true
          git add content/schedules/* || true
          git add content/manifests/* || true
          git add content/logs/* || true

          echo "===== git status ====="
          git status

          if ! git diff --cached --quiet; then
            git commit -m "Build pipeline outputs"
            git push
          else
            echo "No generated files were staged."
          fi
