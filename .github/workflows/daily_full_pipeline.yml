name: Daily Full Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '15 11 * * *'
  workflow_dispatch:

concurrency:
  group: daily-full-pipeline
  cancel-in-progress: false

jobs:
  full_pipeline:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      OPENAI_MODEL: gpt-5
      MAX_TOPICS_PER_DAY: 20
      MIN_TOPIC_SCORE: 50
      MAX_SEARCH_RESULTS_PER_QUERY: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # -------------------------------
      # SAFE EXECUTION FUNCTION
      # -------------------------------
      - name: Create safe runner
        run: |
          cat << 'EOF' > safe_run.sh
          #!/bin/bash
          set -e

          CMD=$1

          echo "Running: $CMD"

          for i in {1..3}
          do
            echo "Attempt $i..."
            if eval $CMD; then
              echo "Success"
              exit 0
            fi
            echo "Retrying in 10 seconds..."
            sleep 10
          done

          echo "Failed after retries, continuing pipeline..."
          exit 0
          EOF

          chmod +x safe_run.sh

      # -------------------------------
      # PIPELINE STEPS (SELF-HEALING)
      # -------------------------------
      - name: Topic Research
        run: ./safe_run.sh "python -m src.main"

      - name: Generate Scripts
        run: ./safe_run.sh "python -m src.generate_scripts"

      - name: Generate Audio
        run: ./safe_run.sh "python -m src.generate_audio"

      - name: Generate Backgrounds
        run: ./safe_run.sh "python -m src.background_generator"

      - name: Render Videos
        run: ./safe_run.sh "python -m src.render_videos"

      - name: Generate Schedule
        run: ./safe_run.sh "python -m src.generate_schedule"

      # -------------------------------
      # HARD CHECKS (DO NOT SKIP)
      # -------------------------------
      - name: Asset Report
        run: python -m src.missing_asset_report

      - name: Publish Readiness Check
        run: python -m src.check_publish_ready

      # -------------------------------
      # PUBLISH (STRICT)
      # -------------------------------
      - name: Publish to YouTube
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -m src.publish_youtube

      # -------------------------------
      # SAVE OUTPUTS
      # -------------------------------
      - name: Commit pipeline outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json || true
          git add content/scripts/* || true
          git add content/audio/* || true
          git add content/backgrounds/* || true
          git add content/videos/* || true
          git add content/thumbnails/* || true
          git add content/schedules/* || true
          git add content/manifests/* || true
          git diff --cached --quiet || git commit -m "Daily full pipeline run"
          git push
