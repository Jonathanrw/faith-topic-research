name: Daily Background Generation

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  generate_backgrounds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate backgrounds
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m src.background_generator

      - name: Commit generated backgrounds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/backgrounds/* || true
          git diff --cached --quiet || git commit -m "Generated AI backgrounds"
          git push
