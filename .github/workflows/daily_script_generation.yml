name: Daily Script Generation

permissions:
  contents: write

on:
  schedule:
    - cron: '45 11 * * *'
  workflow_dispatch:

jobs:
  generate_scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script generation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENAI_MODEL: gpt-5
        run: python -m src.generate_scripts

      - name: Commit generated scripts and updated queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/scripts/* data/*.json || true
          git diff --cached --quiet || git commit -m "Daily script generation update"
          git push
