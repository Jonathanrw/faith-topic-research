name: Daily Schedule Generation

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  generate_schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate schedule
        run: python -m src.generate_schedule

      - name: Commit generated schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/schedules/* config/publishing_schedule.json || true
          git diff --cached --quiet || git commit -m "Generated daily publishing schedule"
          git push
