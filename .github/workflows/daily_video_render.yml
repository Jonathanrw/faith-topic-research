name: Daily Video Render

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  render_videos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install dependencies (clean)
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y moviepy || true
          pip install --no-cache-dir -r requirements.txt
          python -c "import moviepy.editor; print('moviepy.editor OK')"

      - name: Debug files
        run: |
          echo "Scripts:"
          ls -la content/scripts || true
          echo "Audio:"
          ls -la content/audio || true
          echo "Backgrounds:"
          ls -la content/backgrounds || true

      - name: Render videos
        run: python -m src.render_videos

      - name: Commit rendered videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/videos/* || true
          git diff --cached --quiet || git commit -m "Rendered daily videos"
          git push
