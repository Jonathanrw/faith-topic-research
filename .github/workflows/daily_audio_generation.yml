name: Daily Audio Generation

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  generate_audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate audio manifests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5
        run: python -m src.generate_audio

      - name: Commit generated audio manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/audio/* || true
          git diff --cached --quiet || git commit -m "Daily audio generation update"
          git push
