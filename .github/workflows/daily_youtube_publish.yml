name: Daily YouTube Publish

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  publish_youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Print missing asset report
        run: python -m src.missing_asset_report

      - name: Run publish readiness check
        run: python -m src.check_publish_ready

      - name: Publish scheduled YouTube videos
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -m src.publish_youtube

      - name: Commit publish logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/schedules/* || true
          git diff --cached --quiet || git commit -m "Saved YouTube publish log"
          git push
